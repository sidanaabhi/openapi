services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: apiplatform
      POSTGRES_USER: apiplatform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiplatform -d apiplatform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m

  migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app:ro
    command: sh -c "npm install --quiet && npx knex migrate:latest"
    environment:
      DATABASE_URL: postgres://apiplatform:${POSTGRES_PASSWORD:-localdev}@postgres:5432/apiplatform
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  controlplane:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://apiplatform:${POSTGRES_PASSWORD:-localdev}@postgres:5432/apiplatform
      REDIS_URL: redis://redis:6379
      XDS_PORT: "18000"
      EXT_AUTHZ_PORT: "18001"
    ports:
      - "18000:18000"
      - "18001:18001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    restart: unless-stopped
    volumes:
      - ./gateway/envoy/bootstrap.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"
      - "9901:9901"
    depends_on:
      controlplane:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9901/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://apiplatform:${POSTGRES_PASSWORD:-localdev}@postgres:5432/apiplatform
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  portal-admin:
    build:
      context: ./portal-admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - public
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m

  portal-user:
    build:
      context: ./portal-user
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - public
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

